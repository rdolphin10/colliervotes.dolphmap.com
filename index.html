<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Collier County Precinct Map — Dolph Map Company</title>
    <meta name="description" content="Interactive precinct map for Collier County, Florida. Find your voting precinct and polling location.">
    <meta name="keywords" content="Collier County, precinct map, voting, polling locations, elections, Florida, Dolph Map Company">
    <meta name="author" content="Dolph Map Company">

    <!-- Open Graph -->
    <meta property="og:title" content="Collier County Precinct Map — Dolph Map Company">
    <meta property="og:description" content="Interactive precinct map for Collier County, Florida. Find your voting precinct and polling location.">
    <meta property="og:type" content="website">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="assets/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">

    <!-- Preconnect to Mapbox CDN — reduces connection latency for tiles + API -->
    <link rel="preconnect" href="https://api.mapbox.com">
    <link rel="preconnect" href="https://events.mapbox.com">

    <!-- Preload the header logo (LCP element) -->
    <link rel="preload" as="image" type="image/webp" href="assets/logos/collier-votes-header.webp">

    <!-- Mapbox GL JS v3.0.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/theme.css?v=8">
    <link rel="stylesheet" href="css/styles.css?v=8">
</head>
<body>
    <div class="app-container">

        <!-- Sidebar -->
        <div class="sidebar auto-height" id="sidebar">
            <!-- Header with logos -->
            <div class="sidebar-header">
                <picture>
                    <source srcset="assets/logos/collier-votes-header.webp" type="image/webp">
                    <img src="assets/logos/collier-votes-header-opt.png" alt="Melissa R. Blazier — Collier County Supervisor of Elections" class="header-logo-wide" width="442" height="144" fetchpriority="high">
                </picture>
            </div>

            <!-- Address lookup -->
            <div class="address-search">
                <div class="address-search-label">Find Your Precinct</div>
                <div class="address-search-row">
                    <div class="address-input-wrapper">
                        <input type="text"
                               class="search-input"
                               id="address-input"
                               placeholder="Enter your home address..."
                               autocomplete="off">
                        <div class="address-suggestions" id="address-suggestions"></div>
                    </div>
                    <button class="address-search-btn" id="address-search-btn" title="Search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>
                <div class="address-search-result" id="address-result"></div>
            </div>

            <!-- Collapsible Directory -->
            <div class="directory-section collapsed" id="directory-section">
                <div class="directory-toggle" id="directory-toggle">
                    <div class="directory-toggle-left">
                        <svg class="directory-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                        <span class="directory-title">Precinct Directory</span>
                    </div>
                    <span class="directory-count"><span id="precinct-count">0</span> precincts</span>
                </div>
                <div class="directory-body" id="directory-body">
                    <div class="directory-filter">
                        <input type="text"
                               class="search-input"
                               id="search-input"
                               placeholder="Filter precincts..."
                               autocomplete="off">
                    </div>
                    <div class="sidebar-content" id="precinct-list">
                        <!-- Populated by sidebar.js -->
                    </div>
                    <div class="no-results" id="no-results">No precincts found</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="sidebar-footer">
                <picture>
                    <source srcset="assets/logos/dolph-logo.webp" type="image/webp">
                    <img src="assets/logos/dolph-logo.jpg" alt="Dolph Map Company" class="sidebar-footer-logo" width="269" height="56" loading="lazy">
                </picture>
                <span>&copy; 2026 Dolph Map Company &mdash; Est. 1926</span>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>
        </div>

    </div>

    <!-- Mapbox GL JS v3.0.0 — defer to unblock initial paint -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js" defer></script>

    <!-- App Scripts — defer preserves load order while unblocking render -->
    <script src="js/config.js?v=8" defer></script>
    <script src="js/precinct-map.js?v=8" defer></script>
    <script src="js/precinct-layers.js?v=8" defer></script>
    <script src="js/sidebar.js?v=8" defer></script>
</body>
</html>
