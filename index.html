<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Collier County Precinct Map — Dolph Map Company</title>
    <meta name="description" content="Interactive precinct map for Collier County, Florida. Find your voting precinct and polling location.">
    <meta name="keywords" content="Collier County, precinct map, voting, polling locations, elections, Florida, Dolph Map Company">
    <meta name="author" content="Dolph Map Company">

    <!-- Open Graph -->
    <meta property="og:title" content="Collier County Precinct Map — Dolph Map Company">
    <meta property="og:description" content="Interactive precinct map for Collier County, Florida. Find your voting precinct and polling location.">
    <meta property="og:type" content="website">

    <!-- Mapbox GL JS v3.0.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/theme.css?v=2">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <div class="app-container">

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <!-- Header with logos -->
            <div class="sidebar-header">
                <img src="assets/logos/collier-votes-logo.png" alt="Collier County Supervisor of Elections" class="header-logo">
                <div class="header-text">
                    <div class="header-title">Collier County</div>
                    <div class="header-subtitle">Precinct Map</div>
                </div>
            </div>

            <!-- Address lookup -->
            <div class="address-search">
                <div class="address-search-label">Find Your Precinct</div>
                <div class="address-search-row">
                    <input type="text"
                           class="search-input"
                           id="address-input"
                           placeholder="Enter your home address..."
                           autocomplete="off">
                    <button class="address-search-btn" id="address-search-btn" title="Search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>
                <div class="address-search-result" id="address-result"></div>
            </div>

            <!-- Collapsible Directory -->
            <div class="directory-section" id="directory-section">
                <div class="directory-toggle" id="directory-toggle">
                    <div class="directory-toggle-left">
                        <svg class="directory-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                        <span class="directory-title">Precinct Directory</span>
                    </div>
                    <span class="directory-count"><span id="precinct-count">0</span> precincts</span>
                </div>
                <div class="directory-body" id="directory-body">
                    <div class="directory-filter">
                        <input type="text"
                               class="search-input"
                               id="search-input"
                               placeholder="Filter precincts..."
                               autocomplete="off">
                    </div>
                    <div class="sidebar-content" id="precinct-list">
                        <!-- Populated by sidebar.js -->
                    </div>
                    <div class="no-results" id="no-results">No precincts found</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="sidebar-footer">
                <span>Powered by</span>
                <strong>Dolph Map Company</strong>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>
            <div class="dolph-footer">&copy; 2026 Dolph Map Company &mdash; Est. 1926</div>
            <button class="sidebar-toggle" id="sidebar-toggle">&#9776; Precincts</button>
        </div>

    </div>

    <!-- Mapbox GL JS v3.0.0 -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>

    <!-- App Scripts (load order matters) -->
    <script src="js/config.js"></script>
    <script src="js/precinct-map.js"></script>
    <script src="js/precinct-layers.js"></script>
    <script src="js/sidebar.js"></script>
</body>
</html>
